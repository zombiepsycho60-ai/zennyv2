kind = "mobile"
previewPath = "/"
title = "ZennyV2"
version = "1.0.0"
id = "artifacts/zennyv2"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19888

[services.development]
run = "pnpm --filter @workspace/zennyv2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zennyv2", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/zennyv2", "run", "serve" ]

[services.env]
PORT = "19888"
BASE_PATH = "/"
